name: Pull Request Validation CI

on: 
  pull_request:
    branches:
      - main
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull_request code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
        
      - name: Installing all Dependencies 
        run: npm install

      - name: Run automated Tests
        run: npm test